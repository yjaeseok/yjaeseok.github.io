<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>귀찮은 덧셈</title>
	<script>
		var doSum = function(){
			var s = document.getElementById("mytextarea").value;
            let re = new RegExp('[0-9,]+')
            
            var sum = 0
            var exp = ""
            
            while (r = re.exec(s)) {
                num = r[0]
                s = s.replace(num, "")
                num = num.replace(",", "")
                if (exp == "") {
                    exp = num
                } else {
                    exp += " + " + num
                }
                sum += parseInt(num)
            }
            exp += " = " + sum
            document.getElementById("myoutput").value = sum;
            alert(exp)
		}

	</script>

</head>

<body>
	<textarea id="mytextarea" name="data" rows="4" cols="50"></textarea>
	<button onclick="doSum()">=</button>
	<input id="myoutput" type="text"/>
</body>
</html>
